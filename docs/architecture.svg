<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="iris-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d2240"/>
    </linearGradient>
    <linearGradient id="saffi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3a00"/>
      <stop offset="100%" style="stop-color:#3d2600"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a020"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8a020" opacity="0.8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#2a2a2a" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#e8a020" letter-spacing="3">SERFIS — SYSTEM ARCHITECTURE</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ── IRIS SECTION ── -->
  <rect x="40" y="68" width="820" height="155" rx="10" fill="url(#iris-grad)" stroke="#1e5fa0" stroke-width="1" opacity="0.8"/>
  <text x="60" y="92" font-size="11" font-weight="700" fill="#4a9eff" letter-spacing="2">IRIS  ·  AI PROSPECTOR</text>
  <text x="60" y="108" font-size="10" fill="#6a9ec0">iris.serfis.ai</text>

  <!-- Iris boxes -->
  <rect x="60" y="118" width="120" height="48" rx="6" fill="#0a1a2e" stroke="#1e4a7a" stroke-width="1"/>
  <text x="120" y="137" text-anchor="middle" font-size="10" fill="#7ab8e8">Prospect Discovery</text>
  <text x="120" y="153" text-anchor="middle" font-size="9" fill="#4a7a9a">Multi-source</text>
  <text x="120" y="163" text-anchor="middle" font-size="9" fill="#4a7a9a">web-enriched</text>

  <rect x="218" y="118" width="120" height="48" rx="6" fill="#0a1a2e" stroke="#1e4a7a" stroke-width="1"/>
  <text x="278" y="137" text-anchor="middle" font-size="10" fill="#7ab8e8">ICP Scoring</text>
  <text x="278" y="153" text-anchor="middle" font-size="9" fill="#4a7a9a">AI-ranked</text>
  <text x="278" y="163" text-anchor="middle" font-size="9" fill="#4a7a9a">qualified leads</text>

  <rect x="376" y="118" width="120" height="48" rx="6" fill="#0a1a2e" stroke="#1e4a7a" stroke-width="1"/>
  <text x="436" y="137" text-anchor="middle" font-size="10" fill="#7ab8e8">List Builder</text>
  <text x="436" y="153" text-anchor="middle" font-size="9" fill="#4a7a9a">Filtered · deduped</text>
  <text x="436" y="163" text-anchor="middle" font-size="9" fill="#4a7a9a">enriched</text>

  <rect x="534" y="118" width="120" height="48" rx="6" fill="#0a1a2e" stroke="#1e4a7a" stroke-width="1"/>
  <text x="594" y="137" text-anchor="middle" font-size="10" fill="#7ab8e8">Identity &amp; Billing</text>
  <text x="594" y="153" text-anchor="middle" font-size="9" fill="#4a7a9a">Secure access</text>
  <text x="594" y="163" text-anchor="middle" font-size="9" fill="#4a7a9a">usage plans</text>

  <rect x="692" y="118" width="120" height="48" rx="6" fill="#0a1a2e" stroke="#1e4a7a" stroke-width="1"/>
  <text x="752" y="137" text-anchor="middle" font-size="10" fill="#7ab8e8">Data Layer</text>
  <text x="752" y="153" text-anchor="middle" font-size="9" fill="#4a7a9a">Persistent storage</text>
  <text x="752" y="163" text-anchor="middle" font-size="9" fill="#4a7a9a">queryable</text>

  <!-- Iris internal arrows -->
  <line x1="180" y1="142" x2="216" y2="142" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="338" y1="142" x2="374" y2="142" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="496" y1="142" x2="532" y2="142" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="654" y1="142" x2="690" y2="142" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>

  <!-- ── HANDOFF ARROW ── -->
  <text x="450" y="258" text-anchor="middle" font-size="10" fill="#e8a020" font-weight="600" filter="url(#glow)">Verified prospects pushed to Saffi via shared identity</text>
  <line x1="450" y1="226" x2="450" y2="268" stroke="url(#gold)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <circle cx="450" cy="244" r="14" fill="#1a0f00" stroke="#e8a020" stroke-width="1.5"/>
  <text x="450" y="248" text-anchor="middle" font-size="12" fill="#e8a020">⇣</text>

  <!-- ── SAFFI SECTION ── -->
  <rect x="40" y="275" width="820" height="155" rx="10" fill="url(#saffi-grad)" stroke="#8a5a00" stroke-width="1" opacity="0.85"/>
  <text x="60" y="299" font-size="11" font-weight="700" fill="#f5c842" letter-spacing="2">SAFFI  ·  AI SALES DEVELOPMENT REPRESENTATIVE</text>
  <text x="60" y="315" font-size="10" fill="#9a7a30">serfis.ai  ·  Sold as headcount — one flat price per agent</text>

  <!-- Saffi pipeline boxes -->
  <rect x="60" y="325" width="110" height="48" rx="6" fill="#2a1500" stroke="#7a4a00" stroke-width="1"/>
  <text x="115" y="344" text-anchor="middle" font-size="10" fill="#f5c842">Outreach</text>
  <text x="115" y="357" text-anchor="middle" font-size="9" fill="#a07030">Sequencer</text>
  <text x="115" y="368" text-anchor="middle" font-size="9" fill="#a07030">multi-step</text>

  <rect x="203" y="325" width="110" height="48" rx="6" fill="#2a1500" stroke="#7a4a00" stroke-width="1"/>
  <text x="258" y="344" text-anchor="middle" font-size="10" fill="#f5c842">Email</text>
  <text x="258" y="357" text-anchor="middle" font-size="9" fill="#a07030">Generator</text>
  <text x="258" y="368" text-anchor="middle" font-size="9" fill="#a07030">personalized</text>

  <rect x="346" y="325" width="110" height="48" rx="6" fill="#2a1500" stroke="#7a4a00" stroke-width="1"/>
  <text x="401" y="344" text-anchor="middle" font-size="10" fill="#f5c842">Reply</text>
  <text x="401" y="357" text-anchor="middle" font-size="9" fill="#a07030">Handler</text>
  <text x="401" y="368" text-anchor="middle" font-size="9" fill="#a07030">intent-aware</text>

  <rect x="489" y="325" width="110" height="48" rx="6" fill="#2a1500" stroke="#7a4a00" stroke-width="1"/>
  <text x="544" y="344" text-anchor="middle" font-size="10" fill="#f5c842">CRM</text>
  <text x="544" y="357" text-anchor="middle" font-size="9" fill="#a07030">Integration</text>
  <text x="544" y="368" text-anchor="middle" font-size="9" fill="#a07030">auto-synced</text>

  <rect x="632" y="325" width="110" height="48" rx="6" fill="#2a1500" stroke="#7a4a00" stroke-width="1"/>
  <text x="687" y="344" text-anchor="middle" font-size="10" fill="#f5c842">Meeting</text>
  <text x="687" y="357" text-anchor="middle" font-size="9" fill="#a07030">Booker</text>
  <text x="687" y="368" text-anchor="middle" font-size="9" fill="#a07030">auto-scheduled</text>

  <!-- Saffi internal arrows -->
  <line x1="170" y1="349" x2="201" y2="349" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="313" y1="349" x2="344" y2="349" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="456" y1="349" x2="487" y2="349" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="599" y1="349" x2="630" y2="349" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Outcome badge -->
  <rect x="480" y="400" width="220" height="28" rx="14" fill="#1a0c00" stroke="#e8a020" stroke-width="1.5"/>
  <circle cx="498" cy="414" r="5" fill="#e8a020" filter="url(#glow)"/>
  <text x="560" y="418" text-anchor="middle" font-size="10" fill="#f5c842" font-weight="600">Meeting booked. Pipeline full.</text>

  <!-- Footer -->
  <line x1="60" y1="452" x2="840" y2="452" stroke="#2a2a2a" stroke-width="1"/>
  <text x="450" y="474" text-anchor="middle" font-size="10" fill="#3a3a3a">Built by Pranav Akshat · serfis.ai · Full-stack TypeScript · Cloud-native infrastructure</text>
  <text x="450" y="491" text-anchor="middle" font-size="9" fill="#2a2a2a">Private repositories · Production deployments live</text>
</svg>
